    <link rel="manifest" href="manifest.json" />

      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap"

    <link rel="stylesheet" href="css/styles.css" />

    <style>
      /* Tombol Scan Melayang (Sembunyi di Laptop/PC) */
      .mobile-fab-container {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 990; /* Selalu di atas tapi di bawah modal/loading */
      }

      .mobile-fab {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 28px;
        border-radius: 50px;
        box-shadow: 0 8px 24px rgba(234, 108, 0, 0.4); /* Bayangan oranye */
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 1px;
        background: var(--accent); /* Warna utama */
        color: #fff;
        border: none;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .mobile-fab:active {
        transform: translateX(-50%) scale(0.95);
      }

      /* Hanya muncul di layar HP (lebar maksimal 768px) */
      @media (max-width: 768px) {
        .mobile-fab-container {
          display: flex;
        }
        /* Beri ruang ekstra di bawah konten agar tidak tertutup tombol */
        .content-area {
          padding-bottom: 90px !important;
        }
      }
    </style>
  </head>
  <body>

      ></div>

      <aside class="sidebar" id="sidebar">
        <!-- <div class="sidebar-logo">
      <div class="logo-mark">⬡ WMS RMU RO 4</div>
      <div class="logo-sub">Warehouse Management</div>
    </div> -->

        <div class="sidebar-logo">
          <div class="logo-wrapper">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Logo_KAI_Services.svg/250px-Logo_KAI_Services.svg.png"
              alt="KAI Services Logo"
              class="main-logo"
            />
          </div>
          <div class="logo-sub">Warehouse Management RMU RO 4</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Utama</div>
          <div class="nav-item active" onclick="showPage('dashboard', this)">
            <span class="nav-icon">📊</span> Dashboard
          </div>
          <div class="nav-item" onclick="showPage('scan', this)">
            <span class="nav-icon">📷</span> Scan Barang
          </div>

          <div class="nav-section-label">Transaksi</div>
          <div class="nav-item" onclick="showPage('masuk', this)">
            <span class="nav-icon">📦</span> Barang Masuk

          <div class="nav-item" onclick="showPage('keluar', this)">
            <span class="nav-icon">🚚</span> Barang Keluar

          <div class="nav-item" onclick="showPage('riwayat', this)">

          </div>

          <div class="nav-section-label">Manajemen</div>
          <div class="nav-item" onclick="showPage('produk', this)">
            <span class="nav-icon">🏷️</span> Data Produk
          </div>
          <div class="nav-item" onclick="showPage('lokasi', this)">
            <span class="nav-icon">🗺️</span> Peta Rak
          </div>
        </nav>
        <div class="sidebar-footer">
          <strong id="currentUserName">Admin Gudang</strong>
          <span id="currentDate">—</span>

      </aside>

      <div class="main-area">
        <header class="topbar">
          <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
          <div class="topbar-title" id="topbarTitle">DASHBOARD</div>
          <div class="topbar-actions">
            <div class="topbar-time" id="topbarTime">00:00:00</div>
            <button
              class="btn btn-primary btn-sm"
              onclick="showPage('scan', null)"
            >
              <span>📷</span> Scan
            </button>
          </div>
        </header>

        <main class="content-area" id="contentArea">
          <div data-include="pages/dashboard.html"></div>
          <div data-include="pages/scan.html"></div>
          <div data-include="pages/masuk.html"></div>
          <div data-include="pages/keluar.html"></div>
          <div data-include="pages/riwayat.html"></div>
          <div data-include="pages/produk.html"></div>

        </main>
      </div>
    </div>

    <div data-include="pages/modals.html"></div>

    <script src="js/app.js"></script>

    <script>
      // =============================================
      // INCLUDE SYSTEM
      // Memuat file HTML parsial dan menyuntikkannya ke DOM,
      // lalu memanggil initApp() setelah semua selesai dimuat.
      // =============================================
      async function processIncludes() {
        const elements = [...document.querySelectorAll("[data-include]")];
        await Promise.all(
          elements.map(async (el) => {
            const file = el.getAttribute("data-include");
            try {
              // [PERBAIKAN] Tambahkan '?v=' + getTime() agar browser selalu mengambil file HTML TERBARU (Anti-Cache)
              const res = await fetch(file + "?v=" + new Date().getTime());
              const html = await res.text();
              const temp = document.createElement("template");
              temp.innerHTML = html;
              el.replaceWith(temp.content);
            } catch (e) {
              console.error("Gagal memuat include:", file, e);
            }
          })
        );
      }

      document.addEventListener("DOMContentLoaded", async function () {
        await processIncludes();
        initApp();
      });
    </script>

    <div class="mobile-fab-container">
      <button class="mobile-fab" onclick="quickScanGlobal()">
        <span style="font-size: 22px">📷</span>
        <span>QUICK SCAN</span>
      </button>
    </div>
  </body>
