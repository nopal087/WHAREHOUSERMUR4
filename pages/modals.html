<div class="modal-backdrop" id="modalProduk">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalProdukTitle">TAMBAH PRODUK</div>
      <button class="modal-close" onclick="closeModal('modalProduk')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editProdukId">

      <div class="form-group" style="margin-bottom: 12px;">
        <label class="form-label" style="font-weight: 600;">Operator (Pendaftar) <span style="color:var(--red)">*</span></label>
        <input type="text" class="form-control" id="produkOperator" placeholder="Nama Anda...">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Kode Barcode *</label>
          <div class="input-with-btn">
            <input type="text" class="form-control" id="produkBarcode" placeholder="Scan atau ketik barcode">
            <button class="btn btn-outline btn-icon" onclick="scanForModal()" title="Scan barcode">📷</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nama Produk *</label>
          <input type="text" class="form-control" id="produkNama" placeholder="Nama produk...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Kategori</label>
          <input type="text" class="form-control" id="produkKategori" placeholder="Elektronik, Mekanik...">
        </div>
        <div class="form-group">
          <label class="form-label">Satuan</label>
          <select class="form-control" id="produkSatuan">
            <option value="pcs">Pcs</option>
            <option value="unit">Unit</option>
            <option value="box">Box</option>
            <option value="karton">Karton</option>
            <option value="kg">Kg</option>
            <option value="liter">Liter</option>
            <option value="meter">Meter</option>
            <option value="roll">Roll</option>
            <option value="lembar">Lembar</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Stok Awal</label>
          <input type="number" class="form-control" id="produkStok" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Deskripsi</label>
          <input type="text" class="form-control" id="produkDeskripsi" placeholder="Opsional...">
        </div>
      </div>

      <hr class="divider">
      <div class="form-label" style="margin-bottom:12px">📍 Penempatan di Rak</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rak</label>
          <select class="form-control" id="produkRak">
            <option value="">—</option>
            <option value="1">Rak 1</option>
            <option value="2">Rak 2</option>
            <option value="3">Rak 3</option>
            <option value="4">Rak 4</option>
            <option value="5">Rak 5</option>
            <option value="6">Rak 6</option>
            <option value="7">Rak 7</option>
            <option value="8">Rak 8</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Lantai</label>
          <select class="form-control" id="produkLantai">
            <option value="">—</option>
            <option value="1">Lantai 1</option>
            <option value="2">Lantai 2</option>
            <option value="3">Lantai 3</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Baris</label>
          <select class="form-control" id="produkBaris">
            <option value="">—</option>
            <option value="1">Baris 1</option>
            <option value="2">Baris 2</option>
            <option value="3">Baris 3</option>
            <option value="4">Baris 4</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalProduk')">Batal</button>
      <button class="btn btn-primary" onclick="saveProduk()">💾 Simpan</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalHapus">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <div class="modal-title">KONFIRMASI HAPUS</div>
      <button class="modal-close" onclick="closeModal('modalHapus')">✕</button>
    </div>
    <div class="modal-body" style="text-align:center;padding:30px">
      <div style="font-size:52px;margin-bottom:12px">🗑️</div>
      <div style="font-size:16px;margin-bottom:8px">Hapus produk ini?</div>
      <div style="color:var(--text3);font-size:13px" id="hapusProdukNama">—</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modalHapus')">Batal</button>
      <button class="btn btn-danger" onclick="konfirmasiHapus()">🗑️ Hapus</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalMiniScan">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div class="modal-title">📷 SCAN BARCODE</div>
      <button class="modal-close" onclick="closeMiniScanner()">✕</button>
    </div>
    <div class="modal-body" style="padding:12px">
      <div class="scanner-box" id="miniScannerBox" style="min-height:240px">
        <div id="mini-scanner-viewport"></div>
        <div class="scan-indicator" id="miniScanIndicator">✓ TERDETEKSI</div>
        <div class="scan-idle" id="miniScanIdle">
          <span class="scan-idle-icon">📷</span>
          <p>Memulai kamera...</p>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;margin-bottom:0">
        <label class="form-label">Atau Ketik Manual</label>
        <div class="input-with-btn">
          <input type="text" class="form-control" id="miniManualBarcode" placeholder="Kode barcode...">
          <button class="btn btn-primary" onclick="useMiniBarcode()">OK</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>
